<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戒色每日打卡 - 正气值系统</title>
<style>
:root {
  --bg: #0f0f1a; --card: #1a1a2e; --card2: #16213e;
  --gold: #f0c060; --green: #4ade80; --red: #f87171;
  --blue: #60a5fa; --text: #e2e8f0; --text2: #94a3b8;
  --border: #2d2d4a; --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6;
}
.container { max-width: 700px; margin: 0 auto; padding: 16px; }
.header { text-align: center; padding: 24px 0 8px; }
.header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 2px;
  background: linear-gradient(135deg, var(--gold), #f59e0b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header .subtitle { color: var(--text2); font-size: .85rem; margin-top: 4px; }
.stats-row { display: flex; gap: 12px; margin: 16px 0; }
.stat-card { flex:1; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
.stat-card.zhengqi { border-color:#b45309; background: linear-gradient(135deg,#1a1a2e 0%,#1e1a0f 100%); }
.stat-card.streak { border-color:#166534; background: linear-gradient(135deg,#1a1a2e 0%,#0f1e16 100%); }
.stat-label { font-size:.8rem; color:var(--text2); margin-bottom:4px; }
.stat-value { font-size:2rem; font-weight:800; }
.stat-value.zhengqi-val { color:var(--gold); }
.stat-value.streak-val { color:var(--green); }
.stat-unit { font-size:.75rem; color:var(--text2); margin-top:2px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:14px; }
.card h2 { font-size:1rem; margin-bottom:14px; color:var(--gold); }
.check-row { display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
.check-item { flex:1; min-width:120px; }
.check-item label { display:flex; align-items:center; gap:8px; cursor:pointer; padding:10px 14px; background:var(--card2); border:2px solid var(--border); border-radius:10px; transition:.2s; font-size:.9rem; }
.check-item input[type=checkbox] { width:18px; height:18px; accent-color:var(--green); }
.check-item input[type=checkbox]:checked + span { color:var(--green); }
.check-item label:has(input:checked) { border-color:var(--green); }
.check-item.broke label:has(input:checked) { border-color:var(--red); }
.porn-toggle { flex:1; min-width:200px; }
.porn-toggle .btns { display:flex; gap:8px; }
.toggle-btn { flex:1; padding:12px; border:2px solid var(--border); border-radius:10px; cursor:pointer; font-size:.9rem; font-weight:600; transition:.2s; text-align:center; background:var(--card2); color:var(--text2); }
.toggle-btn.clean.active { background:var(--green); color:#000; border-color:var(--green); }
.toggle-btn.broke.active { background:var(--red); color:#fff; border-color:var(--red); }
textarea { width:100%; padding:10px; background:var(--card2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:.88rem; resize:vertical; min-height:60px; margin-bottom:10px; }
textarea:focus { outline:none; border-color:var(--blue); }
.btn { display:inline-block; padding:10px 22px; border-radius:8px; border:none; cursor:pointer; font-size:.9rem; font-weight:600; transition:.2s; font-family:inherit; }
.btn-primary { background:var(--gold); color:#000; width:100%; padding:14px; font-size:1rem; }
.btn-primary:hover { filter:brightness(1.15); }
.btn-sm { padding:5px 12px; font-size:.78rem; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.cal-day { text-align:center; padding:8px 4px; border-radius:8px; font-size:.82rem; background:var(--card2); border:1px solid transparent; }
.cal-day.today { border-color:var(--gold); }
.cal-day.clean { background:#14532d; border-color:var(--green); }
.cal-day.broke { background:#7f1d1d; border-color:var(--red); }
.cal-day.future { opacity:.3; }
.cal-day .day-num { font-weight:700; font-size:.95rem; }
.cal-day .day-score { font-size:.7rem; color:var(--text2); }
.history-item { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; font-size:.88rem; }
.history-item.clean { border-left:3px solid var(--green); }
.history-item.broke { border-left:3px solid var(--red); }
.history-score { font-weight:700; }
.back-link { text-align:center; padding:20px; }
.back-link a { color:var(--blue); text-decoration:none; font-size:.9rem; }
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:12px 24px; border-radius:10px; font-weight:600; z-index:999; animation:fadeIn .3s; }
.toast.success { background:var(--green); color:#000; }
.toast.error { background:var(--red); color:#fff; }
@keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(-10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
.summary-row { display:flex; gap:12px; margin-top:10px; }
.summary-item { flex:1; text-align:center; padding:10px; background:var(--card2); border-radius:8px; }
.summary-item .num { font-size:1.4rem; font-weight:700; }
.summary-item .lbl { font-size:.75rem; color:var(--text2); }
.num.green { color:var(--green); }
.num.red { color:var(--red); }
.num.gold { color:var(--gold); }
details { margin-top:10px; }
summary { cursor:pointer; color:var(--blue); font-size:.85rem; padding:6px 0; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>🛡️ 戒色每日打卡</h1>
    <p class="subtitle">正气值系统 · 数据存于本设备</p>
  </div>

  <!-- 统计卡片 -->
  <div class="stats-row">
    <div class="stat-card zhengqi">
      <div class="stat-label">🔥 正气值</div>
      <div class="stat-value zhengqi-val" id="totalZhengqi">0</div>
      <div class="stat-unit">累积分数</div>
    </div>
    <div class="stat-card streak">
      <div class="stat-label">✅ 连续干净</div>
      <div class="stat-value streak-val" id="streakDays">0</div>
      <div class="stat-unit">天</div>
    </div>
  </div>

  <!-- 今日打卡 -->
  <div class="card">
    <h2>📅 今日打卡 <span style="font-size:.78rem;color:var(--text2)" id="todayLabel"></span></h2>

    <div class="check-row">
      <div class="porn-toggle">
        <div class="btns" id="pornBtns">
          <div class="toggle-btn clean" onclick="setPorn(1)">✅ 干净日</div>
          <div class="toggle-btn broke" onclick="setPorn(0)">❌ 破戒了</div>
        </div>
      </div>
    </div>
    <div class="check-row">
      <div class="check-item">
        <label><input type="checkbox" id="readArticles" onchange="onChange()">📖 阅读戒色文章</label>
      </div>
      <div class="check-item">
        <label><input type="checkbox" id="usedMethod" onchange="onChange()">🧠 使用亲属观+思想转移</label>
      </div>
    </div>
    <textarea placeholder="学到的知识/悟到的道理..." id="knowledge"></textarea>
    <textarea placeholder="今日日记..." id="diary"></textarea>
    <textarea placeholder="笔记（可选）..." id="notes"></textarea>
    <button class="btn btn-primary" onclick="submitCheckin()">💾 保存打卡</button>
  </div>

  <!-- 14天日历 -->
  <div class="card">
    <h2>📊 最近14天</h2>
    <div class="cal-grid" id="calGrid"></div>
    <div class="summary-row" id="summaryRow"></div>
  </div>

  <!-- 全部历史 -->
  <details>
    <summary>📋 全部历史记录</summary>
    <div id="historyList"></div>
  </details>

  <div class="back-link"><a href="/">← 返回首页</a></div>
</div>

<div id="toast"></div>

<script>
// ============ 数据层 (localStorage 替代 SQLite) ============
const STORE_KEY = 'jiese_checkin_data';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch(e) { return {}; }
}

function saveData(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

function getRecord(dateStr) {
  const data = loadData();
  return data[dateStr] || null;
}

function setRecord(dateStr, record) {
  const data = loadData();
  data[dateStr] = record;
  saveData(data);
}

function getAllRecords() {
  const data = loadData();
  return Object.entries(data)
    .map(([date, r]) => ({ date, ...r }))
    .sort((a, b) => b.date.localeCompare(a.date));
}

// ============ 正气值计算 ============
function calcZhengqi(dateStr, noPorn, readArticles, usedMethod) {
  if (noPorn === 0) return -30;

  let score = 10;
  if (readArticles) score += 5;
  if (usedMethod) score += 5;
  if (readArticles && usedMethod) score += 5;

  const d = new Date(dateStr + 'T00:00:00');
  const yesterday = new Date(d);
  yesterday.setDate(yesterday.getDate() - 1);
  const yStr = yesterday.toISOString().slice(0, 10);

  const data = loadData();
  let consecutive = 0;

  if (data[yStr] && data[yStr].noPorn === 1) {
    consecutive = 1;
    let check = new Date(yesterday);
    while (true) {
      check.setDate(check.getDate() - 1);
      const cStr = check.toISOString().slice(0, 10);
      if (data[cStr] && data[cStr].noPorn === 1) {
        consecutive++;
      } else {
        break;
      }
    }
    score += Math.min(consecutive * 2, 20);

    const milestone = consecutive + 1;
    if (milestone === 7) score += 10;
    else if (milestone === 30) score += 30;
    else if (milestone === 100) score += 100;
  }

  return score;
}

function getConsecutive() {
  const data = loadData();
  const today = new Date();
  let consecutive = 0;
  let check = new Date(today);

  while (true) {
    const cStr = check.toISOString().slice(0, 10);
    const r = data[cStr];
    if (r && r.noPorn === 1) {
      consecutive++;
      check.setDate(check.getDate() - 1);
    } else if (r && r.noPorn === 0) {
      break;
    } else {
      check.setDate(check.getDate() - 1);
      // if we skip more than 1 day, stop
      const nextDay = new Date(check);
      nextDay.setDate(nextDay.getDate() + 1);
      if (data[nextDay.toISOString().slice(0,10)]) break;
      continue;
    }
    if (consecutive > 500) break;
  }
  return consecutive;
}

function getTotalZhengqi() {
  const data = loadData();
  return Object.values(data).reduce((sum, r) => sum + (r.zhengqi || 0), 0);
}

// ============ UI 渲染 ============
let currentNoPorn = null;

function setPorn(val) {
  currentNoPorn = val;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(val === 1 ? '.toggle-btn.clean' : '.toggle-btn.broke').classList.add('active');
}

function onChange() {}

function renderAll() {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('todayLabel').textContent = today;

  // 加载今日记录
  const todayRec = getRecord(today);
  if (todayRec) {
    currentNoPorn = todayRec.noPorn;
    document.getElementById('readArticles').checked = todayRec.readArticles === 1;
    document.getElementById('usedMethod').checked = todayRec.usedMethod === 1;
    document.getElementById('knowledge').value = todayRec.knowledge || '';
    document.getElementById('diary').value = todayRec.diary || '';
    document.getElementById('notes').value = todayRec.notes || '';
  } else {
    currentNoPorn = null;
    document.getElementById('readArticles').checked = false;
    document.getElementById('usedMethod').checked = false;
    document.getElementById('knowledge').value = '';
    document.getElementById('diary').value = '';
    document.getElementById('notes').value = '';
  }

  // 更新破戒/干净开关
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  if (currentNoPorn === 1) document.querySelector('.toggle-btn.clean').classList.add('active');
  if (currentNoPorn === 0) document.querySelector('.toggle-btn.broke').classList.add('active');

  // 统计
  document.getElementById('totalZhengqi').textContent = getTotalZhengqi();
  document.getElementById('streakDays').textContent = getConsecutive();

  // 日历
  renderCalendar();
  renderHistory();
}

function renderCalendar() {
  const data = loadData();
  const today = new Date();
  let html = '';

  for (let i = 13; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const dStr = d.toISOString().slice(0, 10);
    const r = data[dStr];
    const isToday = i === 0;
    const isFuture = i < 0;

    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (isFuture) cls += ' future';
    if (r) { cls += r.noPorn === 1 ? ' clean' : ' broke'; }

    html += `<div class="${cls}">
      <div class="day-num">${d.getDate()}</div>
      <div style="font-size:.65rem;color:var(--text2)">周${['日','一','二','三','四','五','六'][d.getDay()]}</div>
      <div class="day-score">${r ? (r.zhengqi >= 0 ? '+' : '') + r.zhengqi : '-'}</div>
    </div>`;
  }

  document.getElementById('calGrid').innerHTML = html;

  // 总结
  let cleanCount = 0, brokeCount = 0;
  for (let i = 13; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const r = data[d.toISOString().slice(0, 10)];
    if (r) { r.noPorn === 1 ? cleanCount++ : brokeCount++; }
  }
  document.getElementById('summaryRow').innerHTML = `
    <div class="summary-item"><div class="num green">${cleanCount}</div><div class="lbl">干净日</div></div>
    <div class="summary-item"><div class="num red">${brokeCount}</div><div class="lbl">破戒日</div></div>
    <div class="summary-item"><div class="num gold">${getConsecutive()}</div><div class="lbl">连续天数</div></div>
  `;
}

function renderHistory() {
  const records = getAllRecords();
  document.getElementById('historyList').innerHTML = records.length === 0
    ? '<p style="color:var(--text2);padding:10px">暂无记录</p>'
    : records.map(r => `
      <div class="history-item ${r.noPorn === 1 ? 'clean' : 'broke'}">
        <div>
          <strong>${r.date}</strong>
          ${r.noPorn === 1 ? ' ✅' : ' ❌'}
          ${r.readArticles === 1 ? ' 📖' : ''}
          ${r.usedMethod === 1 ? ' 🧠' : ''}
        </div>
        <div class="history-score" style="color:${r.zhengqi >= 0 ? 'var(--green)' : 'var(--red)'}">${r.zhengqi >= 0 ? '+' : ''}${r.zhengqi}</div>
      </div>
    `).join('');
}

// ============ 提交 ============
function submitCheckin() {
  if (currentNoPorn === null) {
    showToast('请选择"干净日"或"破戒了"', 'error');
    return;
  }

  const today = new Date().toISOString().slice(0, 10);
  const readArticles = document.getElementById('readArticles').checked ? 1 : 0;
  const usedMethod = document.getElementById('usedMethod').checked ? 1 : 0;
  const knowledge = document.getElementById('knowledge').value.trim();
  const diary = document.getElementById('diary').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const zhengqi = calcZhengqi(today, currentNoPorn, readArticles, usedMethod);

  setRecord(today, {
    noPorn: currentNoPorn,
    readArticles,
    usedMethod,
    knowledge,
    diary,
    notes,
    zhengqi,
  });

  showToast(`✅ 打卡成功！今日正气值 ${zhengqi >= 0 ? '+' : ''}${zhengqi}`, 'success');
  renderAll();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  setTimeout(() => t.className = '', 2500);
}

// ============ 初始化 ============
renderAll();
</script>
</body>
</html>
