baseURL = 'https://forest-sea.github.io/'
locale = 'zh-cn'
title = 'Forest-Sea 的博客'
theme = 'PaperMod'

buildFuture = true

[markup]
  [markup.highlight]
    noclasses = false
    style = "github"

[pagination]
  pagerSize = 10

[params]
  mainSections = ["posts"]
  ShowAllPagesInArchive = true
  ShowReadingTime = true
  ShowShareButtons = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowToc = true
  ShowCodeCopyButtons = true
  ShowFullTextinHomeView = false

  defaultTheme = "auto"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "Forest-Sea"
    Content = "从零开始学网络安全。记录学习笔记、工具使用和成长过程。"

[[menu.main]]
  identifier = "archives"
  name = "文章"
  url = "/archives/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 30
