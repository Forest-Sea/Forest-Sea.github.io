baseURL = 'https://forest-sea.github.io/'
locale = 'zh-cn'
title = '我的博客'
theme = 'PaperMod'

[pagination]
  pagerSize = 10

[params]
  mainSections = ["posts"]
  ShowAllPagesInArchive = true

  ShowReadingTime = true
  ShowShareButtons = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowToc = true
  ShowCodeCopyButtons = true

  [params.homeInfoParams]
    Title = "你好，欢迎来到我的博客"
    Content = "这是我用 Hugo 搭建的个人博客，主要记录学习笔记和日常发现。"

[[menu.main]]
  identifier = "archives"
  name = "文章"
  url = "/archives/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 30
